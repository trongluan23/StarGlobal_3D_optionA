<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống Mô tả Dự án 3D</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 0;
      }
      .main-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 900px;
        margin: 0 auto;
      }
      .form-label {
        font-weight: 600;
        color: #333;
      }
      .btn-generate {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        padding: 12px 40px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      .btn-generate:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }
      .result-section {
        background: #f8f9fa;
        border-radius: 15px;
        padding: 30px;
        margin-top: 30px;
        display: none;
      }
      .result-section.show {
        display: block;
        animation: fadeIn 0.5s;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .result-item {
        margin-bottom: 25px;
      }
      .result-item h5 {
        color: #667eea;
        font-weight: 700;
        margin-bottom: 15px;
      }
      .result-item p,
      .result-item ul {
        color: #555;
        line-height: 1.8;
      }
      .spinner-container {
        display: none;
        text-align: center;
        margin: 20px 0;
      }
      .spinner-container.show {
        display: block;
      }
      h1 {
        color: #333;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
      }
      .form-text {
        font-size: 0.875rem;
      }
      .form-text span {
        font-weight: 600;
        transition: color 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="main-container">
        <div class="text-center mb-4">
          <h1><i class="fas fa-cube"></i> Hệ thống Mô tả Dự án 3D</h1>
          <p class="subtitle">
            Tạo nội dung chuyên nghiệp cho dự án số hóa 3D của bạn
          </p>
        </div>

        <form id="projectForm">
          <div class="mb-4">
            <label for="projectName" class="form-label">
              <i class="fas fa-tag"></i> Tên dự án/không gian 3D *
            </label>
            <input
              type="text"
              name="name"
              class="form-control form-control-lg"
              id="projectName"
              placeholder="VD: Căn hộ Vinhomes Ocean Park"
              required
              maxlength="100"
            />
            <div class="form-text">
              <span id="nameCounter">0/100</span> ký tự
            </div>
          </div>

          <div class="mb-4">
            <label for="spaceType" class="form-label">
              <i class="fas fa-building"></i> Loại không gian *
            </label>
            <input
              type="text"
              name="loaiKG"
              class="form-control form-control-lg"
              id="spaceType"
              placeholder="VD: Căn hộ cao cấp, Văn phòng, Showroom..."
              required
              maxlength="100"
            />
            <div class="form-text">
              <span id="typeCounter">0/100</span> ký tự
            </div>
          </div>

          <div class="mb-4">
            <label for="description" class="form-label">
              <i class="fas fa-align-left"></i> Mô tả ngắn về nội dung/mục đích
              sử dụng
            </label>
            <textarea
              class="form-control"
              id="description"
              rows="4"
              placeholder="Mô tả chi tiết về dự án, mục đích sử dụng..."
              maxlength="200"
            ></textarea>
            <div class="form-text">
              <span id="descCounter">0/200</span> ký tự
            </div>
          </div>

          <div class="mb-4">
            <label for="targetCustomer" class="form-label">
              <i class="fas fa-users"></i> Nhóm khách hàng mục tiêu
            </label>
            <input
              type="text"
              class="form-control form-control-lg"
              id="targetCustomer"
              placeholder="VD: Gia đình trẻ, Doanh nghiệp, Nhà đầu tư..."
              maxlength="100"
            />
            <div class="form-text">
              <span id="customerCounter">0/100</span> ký tự
            </div>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-primary btn-lg btn-generate">
              <i class="fas fa-magic"></i> Tạo Nội dung
            </button>
          </div>
        </form>

        <div class="spinner-container" id="loadingSpinner">
          <div
            class="spinner-border text-primary"
            role="status"
            style="width: 3rem; height: 3rem"
          >
            <span class="visually-hidden">Đang xử lý...</span>
          </div>
          <p class="mt-3 text-muted">
            Đang tạo nội dung chuyên nghiệp cho bạn...
          </p>
        </div>

        <div class="result-section" id="resultSection">
          <h3 class="text-center mb-4">
            <i class="fas fa-check-circle text-success"></i> Kết quả
          </h3>

          <div class="result-item">
            <h5><i class="fas fa-heading"></i> Tiêu đề</h5>
            <p id="resultTitle"></p>
          </div>

          <div class="result-item">
            <h5><i class="fas fa-file-alt"></i> Mô tả ngắn</h5>
            <p id="resultDescription"></p>
          </div>

          <div class="result-item">
            <h5><i class="fas fa-star"></i> Điểm nổi bật</h5>
            <ul id="resultHighlights"></ul>
          </div>

          <div class="result-item">
            <h5><i class="fas fa-lightbulb"></i> Gợi ý số hóa 3D</h5>
            <ul id="resultSuggestions"></ul>
          </div>

          <div class="text-center mt-4">
            <button class="btn btn-outline-primary" onclick="copyResults()">
              <i class="fas fa-copy"></i> Sao chép kết quả
            </button>
            <button
              class="btn btn-outline-secondary ms-2"
              onclick="resetForm()"
            >
              <i class="fas fa-redo"></i> Tạo mới
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
